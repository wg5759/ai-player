name: Source Quality Gate

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm audit --prod --registry=https://registry.npmjs.org
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-quality-evidence
          path: |
            release/security-release-scan.json
            dist/manifest.webmanifest
          if-no-files-found: warn
